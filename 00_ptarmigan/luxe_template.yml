---
# Example of a simulated bunch crossing for the LUXE experiment.
# See Abramowicz et al, EPJST 230, 2445 (2021), arXiv:2102.02032

control:
  dt_multiplier: 0.5
  radiation_reaction: true
  pair_creation: true
  rng_seed: {{ seed|default(0) }}
  increase_pair_rate_by: {{ pair_rate|default(1.0e4) }} # 1e4
  lcfa: false

laser:
  a0: {{ a0|default(5.0) }} # 5
  wavelength: {{ wavelength|default(0.8e-6) }} # 0.8 um
  fwhm_duration: {{ pulse|default(30.0e-15) }} # 30 fs
  waist: {{ waist|default(5.0e-6) }} # 5 um
  polarization: circular

beam:
  n: {{ ngenerate|default(10000) }}
  species: electron
  charge: {{ charge|default(250.0e-12) }} # 250 pC
  gamma: E * eV / (me * c^2) # 16.5 GeV
  sigma: DE * eV / (me * c^2) # 16.5 MeV
  radius: [{{ radius|default(5.0e-6) }}, normally_distributed] # 5 um
  length: {{ length|default(12.0e-6) }} # 12 um ~ 40 fs
  collision_angle: {{ angle|default(-17.2) }} * degree # 17.2 deg
  rms_divergence: {{ divergence|default(8.672e-6) }} # 8.672 urad
  offset: {{ offset|default([0.0, 0.0, 0.0]) }} # 0 0 0

output:
  ident: "{{ tag|default('000_luxe_default_jinja_10000') }}"
  dump_all_particles: hdf5
  discard_background_e: true
  coordinate_system: beam
  units: hep

constants:
  E: {{ E|default(16.5e9,true) }}
  DE: {{ DE|default('0.001 * E') }} # 0.1 %
